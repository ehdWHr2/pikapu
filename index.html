<!DOCTYPE html>
<html>
<head>
<style>
  body { margin:0; background:transparent; }
  #gameWrap { display:flex; flex-direction:column; align-items:center; padding:0.5rem 0; font-family:sans-serif; }
  #gameCanvas { border:2px solid #aaa; border-radius:12px; cursor:pointer; display:block; max-width:100%; }
  #ui { display:flex; gap:24px; margin-bottom:8px; align-items:center; }
  #scoreBox { font-size:20px; font-weight:600; }
  #bestBox { font-size:14px; opacity:0.7; }
  #stageBox { font-size:14px; font-weight:600; color:#f90; }
  #msg { font-size:13px; opacity:0.7; margin-top:6px; }
</style>
</head>
<body>
<div id="gameWrap">
  <div id="ui">
    <div id="scoreBox">점수: <span id="score">0</span></div>
    <div id="stageBox">스테이지: <span id="stageNum">1</span></div>
    <div id="bestBox">최고: <span id="best">0</span></div>
  </div>
  <canvas id="gameCanvas" width="720" height="480"></canvas>
  <div id="msg">스페이스바 또는 클릭으로 시작 / 점프</div>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const msgEl = document.getElementById('msg');
const stageNumEl = document.getElementById('stageNum');
const W = canvas.width, H = canvas.height;

// ─── 오디오 ───────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playJump() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(520, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.08);
  o.frequency.exponentialRampToValueAtTime(660, audioCtx.currentTime + 0.15);
  g.gain.setValueAtTime(0.18, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
  o.start(); o.stop(audioCtx.currentTime + 0.2);
}
function playScore() {
  [0, 0.07, 0.14].forEach((d, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = [660, 780, 1040][i];
    g.gain.setValueAtTime(0.12, audioCtx.currentTime + d);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d + 0.12);
    o.start(audioCtx.currentTime + d);
    o.stop(audioCtx.currentTime + d + 0.14);
  });
}
function playDie() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(400, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.4);
  g.gain.setValueAtTime(0.2, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  o.start(); o.stop(audioCtx.currentTime + 0.45);
}
function playBossAppear() {
  [0,0.1,0.2,0.32].forEach((d,i)=>{
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type='square';
    o.frequency.value=[180,200,220,160][i];
    g.gain.setValueAtTime(0.15,audioCtx.currentTime+d);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d+0.15);
    o.start(audioCtx.currentTime+d); o.stop(audioCtx.currentTime+d+0.18);
  });
}
function playBossDie() {
  for(let i=0;i<6;i++){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type='sawtooth';
    o.frequency.setValueAtTime(300-i*30,audioCtx.currentTime+i*0.07);
    o.frequency.exponentialRampToValueAtTime(60,audioCtx.currentTime+i*0.07+0.2);
    g.gain.setValueAtTime(0.18,audioCtx.currentTime+i*0.07);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+i*0.07+0.22);
    o.start(audioCtx.currentTime+i*0.07); o.stop(audioCtx.currentTime+i*0.07+0.25);
  }
}

// ─── 상태 ────────────────────────────────────────────
let pika, pipes, score, best=0, state, raf;
let tick=0, pipeTimer=0, flashTimer=0, showFlash=false;
let stage=1; // 1:낮, 2:밤, 3:겨울
let snowflakes=[];
let stars=[];
let bossActive=false, bossDefeated=false;
let bossOwl={x:0,y:0,vy:0,vx:0,falling:false,dead:false,phase:0};
let bossHitCount=0;
let stageBanner={show:false, timer:0, text:''};
let bossPassCount=0; // 보스 등장 후 통과 횟수
let bossRock={active:false,x:0,y:0,vy:0}; // 바위

const STAGE_SCORE = [0, 10, 20]; // 각 스테이지 시작 점수
const GAP_NORMAL = 150;
const GAP_BOSS = 170; // 보스 스테이지 더 넓게
let currentGAP = GAP_NORMAL;
const PIPE_W = 56;
const MIN_PIPE_DIST = 260, PIPE_INTERVAL = 110;

function getStage() {
  if (score < 10) return 1;
  if (score < 20) return 2;
  return 3;
}

function showBanner(text) {
  stageBanner = { show: true, timer: 120, text };
}

function initGame() {
  pika = { x:120, y:H/2, vy:0, w:32, h:32 };
  pipes=[]; score=0; state='idle'; stage=1;
  currentGAP=GAP_NORMAL;
  bossActive=false; bossDefeated=false;
  bossOwl={x:W+60,y:80,vy:0,vx:0,falling:false,dead:false,phase:0};
  bossHitCount=0; bossPassCount=0;
  bossRock={active:false,x:0,y:0,vy:0};
  snowflakes=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2.5+1,spd:Math.random()*1.2+0.5,dx:Math.random()*0.6-0.3}));
  stars=Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*(H*0.65),r:Math.random()*1.5+0.5,blink:Math.random()*Math.PI*2}));
  scoreEl.textContent=0; stageNumEl.textContent=1;
  cancelAnimationFrame(raf);
  tick=0; pipeTimer=0; flashTimer=0; showFlash=false;
  msgEl.textContent='스페이스바 또는 클릭으로 시작 / 점프';
  loop();
}

function spawnPipe() {
  if (pipes.length>0 && pipes[pipes.length-1].x > W-MIN_PIPE_DIST) return;
  const minTop=70, maxTop=H-currentGAP-70;
  const topH=Math.floor(Math.random()*(maxTop-minTop+1))+minTop;
  pipes.push({x:W+10, topH, passed:false, vy:0, dir:1});
}

function jump() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (state==='dead') { initGame(); return; }
  if (state==='idle') { state='playing'; msgEl.textContent='스페이스바 또는 클릭으로 점프'; spawnPipe(); }
  pika.vy = -7.2;
  playJump();
}

// ─── 배경 그리기 ──────────────────────────────────────
function drawBg() {
  const s = getStage();
  if (s===1) {
    const sky=ctx.createLinearGradient(0,0,0,H-48);
    sky.addColorStop(0,'#29B6F6'); sky.addColorStop(1,'#B3E5FC');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H-48);
    drawMountains(s);
    ctx.fillStyle='#43A047'; ctx.fillRect(0,H-48,W,48);
    ctx.fillStyle='#388E3C'; ctx.fillRect(0,H-50,W,6);
  } else if (s===2) {
    const sky=ctx.createLinearGradient(0,0,0,H-48);
    sky.addColorStop(0,'#0D1B3E'); sky.addColorStop(1,'#1A2E5A');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H-48);
    drawStars();
    drawMoon();
    drawMountains(s);
    ctx.fillStyle='#1B3A1B'; ctx.fillRect(0,H-48,W,48);
    ctx.fillStyle='#143214'; ctx.fillRect(0,H-50,W,6);
  } else {
    const sky=ctx.createLinearGradient(0,0,0,H-48);
    sky.addColorStop(0,'#455A64'); sky.addColorStop(1,'#90A4AE');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H-48);
    drawStars();
    drawMoon();
    drawMountains(s);
    ctx.fillStyle='#90CAF9'; ctx.fillRect(0,H-48,W,48);
    ctx.fillStyle='#BBDEFB'; ctx.fillRect(0,H-50,W,6);
    drawSnow();
  }
}

function drawMountains(s) {
  const c1 = s===1?'#81C784':s===2?'#1B3A1B':'#B0BEC5';
  const c2 = s===1?'#66BB6A':s===2?'#143214':'#CFD8DC';
  ctx.fillStyle=c1;
  ctx.beginPath();
  ctx.moveTo(0,H-48);
  [60,130,200,290,380,460,540,620,720].forEach((mx,i)=>{
    const hy=[H-130,H-80,H-160,H-90,H-175,H-100,H-155,H-95,H-140][i];
    ctx.lineTo(mx,hy);
  });
  ctx.lineTo(720,H-48); ctx.closePath(); ctx.fill();
  ctx.fillStyle=c2;
  ctx.beginPath();
  ctx.moveTo(0,H-48);
  [80,160,250,340,440,530,640,720].forEach((mx,i)=>{
    const hy=[H-105,H-70,H-120,H-75,H-115,H-72,H-108,H-78][i];
    ctx.lineTo(mx,hy);
  });
  ctx.lineTo(720,H-48); ctx.closePath(); ctx.fill();
  if (s===3) {
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.beginPath();
    [0,80,160,250,340,440,530,640,720].forEach((mx,i)=>{
      const hy=[H-105,H-113,H-78,H-128,H-83,H-123,H-80,H-116,H-86][i];
      ctx.lineTo(mx,hy);
    });
    ctx.lineTo(720,H-48); ctx.lineTo(0,H-48); ctx.closePath(); ctx.fill();
  }
}

function drawStars() {
  stars.forEach(s=>{
    s.blink+=0.04;
    const alpha=0.5+0.5*Math.sin(s.blink);
    ctx.fillStyle=`rgba(255,255,255,${alpha})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });
}

function drawMoon() {
  ctx.fillStyle='#FFF9C4';
  ctx.beginPath(); ctx.arc(640,55,28,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=getStage()===2?'#1A2E5A':'#607D8B';
  ctx.beginPath(); ctx.arc(650,48,22,0,Math.PI*2); ctx.fill();
}

function drawSnow() {
  snowflakes.forEach(sf=>{
    sf.y+=sf.spd; sf.x+=sf.dx;
    if(sf.y>H) sf.y=-4;
    if(sf.x>W) sf.x=0; if(sf.x<0) sf.x=W;
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.beginPath(); ctx.arc(sf.x,sf.y,sf.r,0,Math.PI*2); ctx.fill();
  });
}

function drawClouds() {
  if(getStage()===3) return;
  const alpha=getStage()===2?0.25:0.9;
  [[60,45,38,0.22],[180,32,28,0.15],[320,50,42,0.28],[470,38,32,0.19],[610,44,36,0.24]].forEach(([bx,by,r,spd])=>{
    const x=((bx-(tick*spd)%W)+W*3)%W;
    ctx.fillStyle=`rgba(255,255,255,${alpha})`;
    ctx.beginPath(); ctx.ellipse(x,by,r,r*0.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+r*0.6,by+r*0.15,r*0.65,r*0.4,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x-r*0.55,by+r*0.15,r*0.55,r*0.36,0,0,Math.PI*2); ctx.fill();
  });
}

// ─── 파이프 ───────────────────────────────────────────
function drawPipe(pipe) {
  const s=getStage();
  const capH=22;
  const gc=s===3?['#78909C','#90A4AE','#546E7A']:['#388E3C','#66BB6A','#2E7D32'];
  const g1=ctx.createLinearGradient(pipe.x,0,pipe.x+PIPE_W,0);
  g1.addColorStop(0,gc[0]); g1.addColorStop(0.4,gc[1]); g1.addColorStop(1,gc[2]);
  ctx.fillStyle=g1;
  ctx.beginPath(); ctx.roundRect(pipe.x,0,PIPE_W,pipe.topH-capH,[0,0,3,3]); ctx.fill();
  ctx.beginPath(); ctx.roundRect(pipe.x,pipe.topH+currentGAP+capH,PIPE_W,H-pipe.topH-currentGAP-capH-48,[3,3,0,0]); ctx.fill();
  const g2=ctx.createLinearGradient(pipe.x-7,0,pipe.x+PIPE_W+7,0);
  g2.addColorStop(0,gc[2]); g2.addColorStop(0.4,gc[1]); g2.addColorStop(1,gc[0]);
  ctx.fillStyle=g2;
  ctx.beginPath(); ctx.roundRect(pipe.x-7,pipe.topH-capH,PIPE_W+14,capH,[4,4,4,4]); ctx.fill();
  ctx.beginPath(); ctx.roundRect(pipe.x-7,pipe.topH+currentGAP,PIPE_W+14,capH,[4,4,4,4]); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.13)';
  ctx.fillRect(pipe.x+5,0,7,pipe.topH-capH);
  ctx.fillRect(pipe.x+5,pipe.topH+currentGAP+capH,7,H);
}

// ─── 피카퓨 ───────────────────────────────────────────
function drawPika(p, t) {
  const bob=state==='dead'?0:Math.sin(t*0.08)*1.2;
  const tilt=Math.max(-28,Math.min(22,p.vy*3));
  ctx.save();
  ctx.translate(p.x+p.w/2,p.y+p.h/2+bob);
  ctx.rotate(tilt*Math.PI/180);
  const hw=p.w/2, hh=p.h/2;
  ctx.fillStyle='#FFD700';
  ctx.beginPath(); ctx.moveTo(-hw+2,hh-4);
  ctx.quadraticCurveTo(-hw-10,hh+8,-hw-4,hh+14);
  ctx.quadraticCurveTo(-hw+2,hh+8,hw-4,hh+2);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#E6A800'; ctx.lineWidth=0.8; ctx.stroke();
  ctx.fillStyle='#FFD700';
  ctx.beginPath(); ctx.ellipse(0,2,hw,hh,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#E6A800'; ctx.lineWidth=0.7; ctx.stroke();
  ctx.fillStyle='#FFD700';
  ctx.beginPath(); ctx.ellipse(-hw+3,-hh,5,11,-0.25,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(hw-3,-hh,5,11,0.25,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.ellipse(-hw+3,-hh+2,3,7,-0.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(hw-3,-hh+2,3,7,0.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.arc(-6,-1,3.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6,-1,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-5,-2.5,1.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7,-2.5,1.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.ellipse(0,2.5,2,1.5,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#cc3333'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(0,4,3,0.1,Math.PI-0.1); ctx.stroke();
  ctx.fillStyle='rgba(255,100,50,0.65)';
  ctx.beginPath(); ctx.ellipse(-hw+4,4,6,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(hw-4,4,6,4,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ─── 노엉이 보스 ──────────────────────────────────────
function drawOwl(owl) {
  if (owl.dead) return;
  const x=owl.x, y=owl.y;
  const wobble=owl.falling?0:Math.sin(tick*0.06)*4;
  ctx.save();
  ctx.translate(x, y+wobble);
  if (owl.falling) {
    ctx.rotate(tick*0.18);
  }
  // 몸
  ctx.fillStyle='#5D4037';
  ctx.beginPath(); ctx.ellipse(0,0,22,26,0,0,Math.PI*2); ctx.fill();
  // 날개
  ctx.fillStyle='#4E342E';
  ctx.beginPath(); ctx.ellipse(-26,4,14,10,0.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(26,4,14,10,-0.5,0,Math.PI*2); ctx.fill();
  // 귀 뿔
  ctx.fillStyle='#5D4037';
  ctx.beginPath(); ctx.moveTo(-10,-22); ctx.lineTo(-4,-36); ctx.lineTo(2,-22); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(10,-22); ctx.lineTo(16,-36); ctx.lineTo(22,-22); ctx.closePath(); ctx.fill();
  // 얼굴 디스크
  ctx.fillStyle='#EFEBE9';
  ctx.beginPath(); ctx.ellipse(0,-4,15,17,0,0,Math.PI*2); ctx.fill();
  // 눈 (크고 무서운)
  ctx.fillStyle='#FFF176';
  ctx.beginPath(); ctx.arc(-7,-8,8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7,-8,8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.arc(-7,-8,5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7,-8,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-5,-10,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(9,-10,2,0,Math.PI*2); ctx.fill();
  // 부리
  ctx.fillStyle='#FF8F00';
  ctx.beginPath(); ctx.moveTo(-4,0); ctx.lineTo(0,6); ctx.lineTo(4,0); ctx.closePath(); ctx.fill();
  // HP 바
  if (!owl.falling) {
    const hp = Math.max(0, 1 - bossPassCount/10);
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.fillRect(-22,-38,44,7);
    ctx.fillStyle=hp>0.5?'#4CAF50':hp>0.25?'#FF9800':'#f44336';
    ctx.fillRect(-22,-38,44*hp,7);
    ctx.strokeStyle='#fff'; ctx.lineWidth=0.8;
    ctx.strokeRect(-22,-38,44,7);
  }
  ctx.restore();
}

function drawRock(rock) {
  if (!rock.active) return;
  ctx.save();
  ctx.translate(rock.x, rock.y);
  ctx.rotate(tick*0.12);
  ctx.fillStyle='#78909C';
  ctx.beginPath();
  ctx.moveTo(-12,-8); ctx.lineTo(4,-14); ctx.lineTo(14,-4);
  ctx.lineTo(10,10); ctx.lineTo(-6,12); ctx.lineTo(-14,4);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#90A4AE';
  ctx.beginPath(); ctx.ellipse(-4,-4,5,3,-0.3,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ─── 스테이지 배너 ────────────────────────────────────
function drawBanner() {
  if (!stageBanner.show) return;
  const alpha = Math.min(1, stageBanner.timer/30) * Math.min(1,(stageBanner.timer)/30);
  ctx.save();
  ctx.globalAlpha = Math.min(1, stageBanner.timer/20);
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.beginPath(); ctx.roundRect(W/2-160,H/2-36,320,72,12); ctx.fill();
  ctx.fillStyle='#FFD700';
  ctx.font='bold 26px sans-serif';
  ctx.textAlign='center';
  ctx.fillText(stageBanner.text, W/2, H/2+8);
  ctx.restore();
  stageBanner.timer--;
  if(stageBanner.timer<=0) stageBanner.show=false;
}

function drawOverlay(txt, sub) {
  ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff'; ctx.font='500 30px sans-serif'; ctx.textAlign='center';
  ctx.fillText(txt, W/2, H/2-22);
  if(sub){ ctx.font='400 16px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.82)'; ctx.fillText(sub,W/2,H/2+18); }
  ctx.textAlign='left';
}

// ─── 메인 루프 ────────────────────────────────────────
let prevStage=1;
const PIPE_SPEED_NORMAL=2.6, PIPE_SPEED_BOSS=2.0;
let pipeSpeed=PIPE_SPEED_NORMAL;

function loop() {
  tick++;
  ctx.clearRect(0,0,W,H);

  const s=getStage();
  if(s!==prevStage){
    prevStage=s;
    stageNumEl.textContent=s;
    
  }

  // 보스 등장 조건
  if(score>=50 && !bossActive && !bossDefeated) {
    bossActive=true;
    currentGAP=GAP_BOSS;
    pipeSpeed=PIPE_SPEED_BOSS;
    bossOwl={x:W-80,y:70,vy:0,vx:-0.4,falling:false,dead:false};
    bossPassCount=0;
    showBanner('부엉이 보스 등장!!');
    playBossAppear();
  }

  drawBg();
  drawClouds();

  for(let p of pipes) drawPipe(p);

  // 보스 파이프 세로 움직임
  if(bossActive && !bossOwl.falling) {
    for(let p of pipes) {
      p.topH += p.dir * 0.7;
      if(p.topH > H - currentGAP - 70 || p.topH < 70) p.dir *= -1;
    }
  }

  drawPika(pika, tick);
  if(bossActive) drawOwl(bossOwl);
  if(bossRock.active) drawRock(bossRock);

  if(showFlash){ ctx.fillStyle='rgba(255,220,0,0.22)'; ctx.fillRect(0,0,W,H); if(--flashTimer<=0) showFlash=false; }

  drawBanner();

  if(state==='playing'){
    // 피카퓨 물리
    pika.vy += 0.40;
    pika.y += pika.vy;

    // 파이프
    pipeTimer++;
    if(pipeTimer>=PIPE_INTERVAL){ spawnPipe(); pipeTimer=0; }
    for(let i=pipes.length-1;i>=0;i--){
      pipes[i].x -= pipeSpeed;
      if(!pipes[i].passed && pipes[i].x+PIPE_W < pika.x){
        pipes[i].passed=true; score++;
        scoreEl.textContent=score;
        if(score>best){ best=score; bestEl.textContent=best; }
        showFlash=true; flashTimer=7;
        playScore();
        // 보스 피격
        if(bossActive && !bossOwl.falling){
          bossPassCount++;
          if(bossPassCount>=10){
            // 보스 죽음
            bossOwl.falling=true;
            bossOwl.vy=2; bossOwl.vx=-1.5;
            bossRock={active:true, x:bossOwl.x, y:bossOwl.y-30, vy:-8};
            playBossDie();
            showBanner(' 부엉이 보스 격파!!');
          }
        }
      }
      if(pipes[i].x+PIPE_W<0) pipes.splice(i,1);
    }

    // 보스 움직임
    if(bossActive){
      if(!bossOwl.falling){
        bossOwl.x += bossOwl.vx;
        if(bossOwl.x < W*0.55 || bossOwl.x > W-40) bossOwl.vx*=-1;
        bossOwl.y = 70 + Math.sin(tick*0.03)*40;
      } else {
        bossOwl.x += bossOwl.vx;
        bossOwl.y += bossOwl.vy;
        bossOwl.vy += 0.18;
        if(bossOwl.y > H+80) { bossOwl.dead=true; bossActive=false; bossDefeated=true; }
      }
      // 바위
      if(bossRock.active){
        bossRock.y += bossRock.vy;
        bossRock.vy += 0.4;
        if(bossRock.y > H+60) bossRock.active=false;
        // 바위 피카퓨 충돌
        const dx=bossRock.x-pika.x-pika.w/2, dy=bossRock.y-pika.y-pika.h/2;
        if(Math.sqrt(dx*dx+dy*dy)<20){ state='dead'; playDie(); msgEl.textContent='다시 클릭하거나 스페이스바를 누르세요'; }
      }
    }

    // 충돌 체크
    if(pika.y+pika.h>H-48||pika.y<0){ state='dead'; playDie(); msgEl.textContent='다시 클릭하거나 스페이스바를 누르세요'; }
    for(let p of pipes){
      if(pika.x+pika.w-6>p.x+5 && pika.x+6<p.x+PIPE_W-5){
        if(pika.y+6<p.topH || pika.y+pika.h-6>p.topH+currentGAP){ state='dead'; playDie(); msgEl.textContent='다시 클릭하거나 스페이스바를 누르세요'; }
      }
    }
  }

  if(state==='idle') drawOverlay('피카퓨 점프!','스페이스바 또는 클릭으로 시작');
  if(state==='dead') drawOverlay(`게임 오버!  점수: ${score}`,'다시 하려면 클릭 또는 스페이스바');

  raf=requestAnimationFrame(loop);
}

document.addEventListener('keydown',e=>{ if(e.code==='Space'){e.preventDefault();jump();} });
canvas.addEventListener('click',jump);
canvas.addEventListener('touchstart',e=>{ e.preventDefault();jump(); },{passive:false});
initGame();
</script>
</body>
</html>
